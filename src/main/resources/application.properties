server.port=8080
server.address=0.0.0.0


# 数据库配置（MySQL 8）
spring.datasource.url=jdbc:mysql://localhost:3306/noteproject_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Session 配置（Android 端 Cookie/Session 鉴权）
server.servlet.session.timeout=15d
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false